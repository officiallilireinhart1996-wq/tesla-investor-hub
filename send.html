<form id="sendForm" class="space-y-5">
    <div>
        <label class="block text-xs font-medium uppercase tracking-wider text-neutral-400 mb-2">Select Destination Bank</label>
        <select id="assetSelect" onchange="toggleManualBank(this.value)" class="w-full bg-[#1c1c1c] border border-[#333] rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#E82127] text-sm">
            <optgroup label="United States" class="bg-[#141414]">
                <option value="Chase Bank (USA)">Chase Bank</option>
                <option value="Bank of America (USA)">Bank of America</option>
            </optgroup>
            <optgroup label="United Kingdom" class="bg-[#141414]">
                <option value="HSBC (UK)">HSBC</option>
                <option value="Barclays (UK)">Barclays</option>
            </optgroup>
            <optgroup label="India" class="bg-[#141414]">
                <option value="HDFC (India)">HDFC Bank</option>
                <option value="SBI (India)">State Bank of India</option>
            </optgroup>
            <optgroup label="Germany" class="bg-[#141414]">
                <option value="Deutsche Bank (Germany)">Deutsche Bank</option>
            </optgroup>
            <option value="Other">Other (Manual Entry)</option>
        </select>
    </div>

    <div id="manualBankDiv" class="hidden">
        <input type="text" id="manualBankName" placeholder="Enter Bank Name" class="w-full bg-[#1c1c1c] border border-[#333] rounded-xl px-4 py-3 text-white mb-3 text-sm">
    </div>

    <div>
        <label class="block text-xs font-medium uppercase tracking-wider text-neutral-400 mb-2">Account Number / IBAN / SWIFT</label>
        <input type="text" id="recipientAddress" required placeholder="Enter account details" 
            class="w-full bg-[#1c1c1c] border border-[#333] rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#E82127] text-sm font-mono">
    </div>

    <div>
        <label class="block text-xs font-medium uppercase tracking-wider text-neutral-400 mb-2">Transfer Amount (USD)</label>
        <div class="relative">
            <span class="absolute left-4 top-3 text-neutral-500 font-medium text-sm">$</span>
            <input type="number" id="sendAmount" required min="5" placeholder="0.00" 
                class="w-full bg-[#1c1c1c] border border-[#333] rounded-xl pl-8 pr-4 py-3 text-white focus:outline-none focus:border-[#E82127] text-sm font-semibold">
        </div>
    </div>

    <button type="submit" id="submitBtn" class="w-full bg-[#E82127] hover:bg-[#c61a1f] text-white font-medium py-3.5 rounded-xl transition-all text-sm mt-4">
        Authorize Outbound Dispatch
    </button>
</form>

<script>
    // Show/Hide manual entry
    function toggleManualBank(val) {
        document.getElementById('manualBankDiv').style.display = (val === 'Other') ? 'block' : 'none';
    }

    // Inside your submit listener:
    // Change your 'asset' variable to:
    // const selected = document.getElementById('assetSelect').value;
    // const asset = (selected === 'Other') ? document.getElementById('manualBankName').value : selected;
</script>
