<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Capital Portal - Transfer Funds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0d; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col justify-between pb-8">

    <header class="flex items-center justify-between px-6 py-4 border-b border-[#1c1c1c] bg-[#0d0d0d]">
        <a href="dashboard.html" class="text-neutral-400 hover:text-white flex items-center text-sm">
            ‹ Back to Hub
        </a>
        <span class="text-xs font-bold tracking-widest text-[#E82127] uppercase">Outbound Transfer</span>
        <div class="w-12"></div>
    </header>

    <main class="max-w-md w-full mx-auto px-4 mt-6 flex-grow">
        <div id="formCard" class="bg-[#141414] border border-[#222] rounded-2xl p-6 shadow-2xl">
            <h2 class="text-xl font-bold tracking-tight mb-1">Send Assets</h2>
            <p class="text-xs text-neutral-400 mb-6">Transfer capital or specific share holdings securely.</p>

            <div id="statusBox" class="hidden mb-4 p-4 text-sm rounded-xl border"></div>

            <form id="sendForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-medium uppercase tracking-wider text-neutral-400 mb-2">Select Asset / Network</label>
                    <select id="assetSelect" class="w-full bg-[#1c1c1c] border border-[#333] rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#E82127]">
                        <option value="Bitcoin (BTC)">Bitcoin (BTC)</option>
                        <option value="USDT (TRC20)">USDT (TRC20)</option>
                        <option value="Ethereum (ETH)">Ethereum (ETH)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-medium uppercase tracking-wider text-neutral-400 mb-2">Recipient Address / ID</label>
                    <input type="text" id="recipientAddress" required placeholder="Enter address or user ID" 
                           class="w-full bg-[#1c1c1c] border border-[#333] rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#E82127] font-mono">
                </div>

                <div>
                    <label class="block text-xs font-medium uppercase tracking-wider text-neutral-400 mb-2">Amount (USD)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-3.5 text-neutral-500">$</span>
                        <input type="number" id="sendAmount" required min="10" step="0.01" placeholder="0.00" 
                               class="w-full bg-[#1c1c1c] border border-[#333] rounded-xl pl-8 pr-4 py-3 text-white focus:outline-none focus:border-[#E82127]">
                    </div>
                </div>

                <button type="submit" id="submitBtn" 
                        class="w-full bg-[#E82127] hover:bg-red-700 active:scale-95 py-4 rounded-xl font-medium transition-all">
                    Authorize Outbound Dispatch
                </button>
            </form>
        </div>

        <!-- PIN Prompt -->
        <div id="pinModal" class="hidden fixed inset-0 bg-black/90 z-[200] flex items-center justify-center p-6">
            <div class="bg-[#141414] border border-[#222] rounded-3xl p-8 w-full max-w-xs text-center">
                <h3 class="font-bold text-lg mb-4">Enter 4-Digit PIN</h3>
                <input type="password" id="pinInput" maxlength="4" inputmode="numeric" 
                       class="w-full text-center text-4xl bg-[#1c1c1c] border border-[#333] rounded-2xl py-4 tracking-widest focus:outline-none focus:border-[#E82127]">
                <div class="mt-6 flex gap-3">
                    <button onclick="cancelPin()" class="flex-1 py-3 bg-neutral-800 rounded-2xl">Cancel</button>
                    <button onclick="verifyPin()" class="flex-1 py-3 bg-[#E82127] rounded-2xl">Confirm</button>
                </div>
            </div>
        </div>

        <!-- Receipt Screen -->
        <div id="receiptCard" class="hidden bg-[#141414] border border-[#222] rounded-2xl p-6 shadow-2xl">
            <div class="text-center">
                <div class="mx-auto w-16 h-16 bg-emerald-500/10 rounded-full flex items-center justify-center mb-4">
                    <span class="text-4xl">✅</span>
                </div>
                <h2 class="text-2xl font-bold text-emerald-400">Transaction Submitted</h2>
                <p class="text-neutral-400 mt-1">Processing • Expected in 5-30 minutes</p>
            </div>

            <div class="mt-8 bg-[#0d0d0d] rounded-2xl p-5 space-y-4">
                <div class="flex justify-between">
                    <span class="text-neutral-400">Amount</span>
                    <span class="font-mono font-bold" id="receiptAmount">$0.00</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-neutral-400">Asset</span>
                    <span class="font-mono" id="receiptAsset"></span>
                </div>
                <div class="flex justify-between">
                    <span class="text-neutral-400">Recipient</span>
                    <span class="font-mono text-sm break-all" id="receiptRecipient"></span>
                </div>
                <div class="flex justify-between">
                    <span class="text-neutral-400">Status</span>
                    <span class="text-emerald-400 font-medium">Processing</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-neutral-400">Date</span>
                    <span class="font-mono text-sm" id="receiptDate"></span>
                </div>
            </div>

            <a href="dashboard.html" class="block mt-8 w-full text-center bg-neutral-900 py-4 rounded-2xl text-sm hover:bg-neutral-800">
                Return to Dashboard
            </a>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxMvLEjQRlW8Gveer2mNJf-bnoFsXLVb0wjNdcGkujWwnLVzTf2iDCQI19yVUTi0rtG5w/exec";
        const userId = localStorage.getItem("userId");

        if (!userId) window.location.href = "index.html";

        let currentBalance = 0;
        let pendingPayload = null;

        // Load real balance
        async function loadBalance() {
            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ action: "getDashboardData", userId: userId })
                });
                const result = await res.json();
                if (result.status === "success") {
                    currentBalance = parseFloat(result.account.balance) || 0;
                    localStorage.setItem('balance', currentBalance);
                }
            } catch(e) {}
        }

        // Check if PIN is set
        function hasPin() {
            return localStorage.getItem('userPin') !== null;
        }

        // Show PIN setup
        function showPinSetup() {
            const pin = prompt("Create your 4-digit security PIN for transactions:");
            if (pin && pin.length === 4 && !isNaN(pin)) {
                localStorage.setItem('userPin', pin);
                alert("PIN set successfully!");
                submitWithPin();
            } else {
                alert("Please enter a valid 4-digit PIN.");
            }
        }

        // Verify PIN
        function showPinPrompt() {
            document.getElementById('pinModal').classList.remove('hidden');
            document.getElementById('pinInput').focus();
        }

        function cancelPin() {
            document.getElementById('pinModal').classList.add('hidden');
            document.getElementById('submitBtn').disabled = false;
            document.getElementById('submitBtn').innerText = "Authorize Outbound Dispatch";
        }

        function verifyPin() {
            const enteredPin = document.getElementById('pinInput').value.trim();
            const savedPin = localStorage.getItem('userPin');

            if (enteredPin === savedPin) {
                document.getElementById('pinModal').classList.add('hidden');
                document.getElementById('pinInput').value = '';
                submitWithPin();
            } else {
                alert("Incorrect PIN. Try again.");
                document.getElementById('pinInput').value = '';
            }
        }

        function submitWithPin() {
            const payload = pendingPayload;
            if (!payload) return;

            const formCard = document.getElementById('formCard');
            const receiptCard = document.getElementById('receiptCard');

            fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "text/plain" },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(result => {
                if (result.status === "success") {
                    formCard.classList.add('hidden');
                    receiptCard.classList.remove('hidden');

                    document.getElementById('receiptAmount').textContent = '$' + payload.amount.toFixed(2);
                    document.getElementById('receiptAsset').textContent = payload.asset;
                    document.getElementById('receiptRecipient').textContent = payload.recipient;
                    document.getElementById('receiptDate').textContent = new Date().toLocaleString();
                } else {
                    alert(result.message || "Transaction failed.");
                }
            })
            .catch(() => alert("Failed to process transaction."));
        }

        document.getElementById('sendForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const statusBox = document.getElementById('statusBox');

            btn.disabled = true;
            btn.innerHTML = 'Processing...';

            const amount = parseFloat(document.getElementById('sendAmount').value);

            if (amount > currentBalance) {
                statusBox.className = "mb-4 p-4 text-red-400 bg-red-950/30 border border-red-900 rounded-xl";
                statusBox.textContent = "Insufficient balance. Available: $" + currentBalance.toFixed(2);
                statusBox.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "Authorize Outbound Dispatch";
                return;
            }

            pendingPayload = {
                action: "submitTransfer",
                userId: userId,
                amount: amount,
                asset: document.getElementById('assetSelect').value,
                recipient: document.getElementById('recipientAddress').value
            };

            if (!hasPin()) {
                showPinSetup();
            } else {
                showPinPrompt();
            }
        });

        // Load balance on page load
        loadBalance();
    </script>
</body>
</html>
