<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Capital Portal - Transfer Funds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0d; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .success-check {
            animation: checkPop 0.6s ease forwards;
        }
        @keyframes checkPop {
            0% { transform: scale(0.5); opacity: 0; }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col justify-between pb-8">

    <header class="flex items-center justify-between px-6 py-4 border-b border-[#1c1c1c] bg-[#0d0d0d]">
        <a href="dashboard.html" class="text-neutral-400 hover:text-white flex items-center text-sm">
            ‹ Back to Hub
        </a>
        <span class="text-xs font-bold tracking-widest text-[#E82127] uppercase">Outbound Transfer</span>
        <div class="w-12"></div>
    </header>

    <main class="max-w-md w-full mx-auto px-4 mt-6 flex-grow">
        <!-- Transfer Input Form -->
        <div id="formCard" class="bg-[#141414] border border-[#222] rounded-2xl p-6 shadow-2xl">
            <h2 class="text-xl font-bold tracking-tight mb-1">Send Assets</h2>
            <p class="text-xs text-neutral-400 mb-6">Transfer capital or specific share holdings securely to external networks or user terminals.</p>

            <div id="statusBox" class="hidden mb-4 p-4 text-sm rounded-xl border"></div>

            <form id="sendForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-medium uppercase tracking-wider text-neutral-400 mb-2">Select Asset / Network</label>
                    <select id="assetSelect" class="w-full bg-[#1c1c1c] border border-[#333] rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#E82127] text-sm">
                        <option value="USDT (TRC20)">USDT (Tron Network - TRC20)</option>
                        <option value="Bitcoin (BTC)">Bitcoin (BTC)</option>
                        <option value="Ethereum (ETH)">Ethereum (ERC20)</option>
                        <option value="USDC (ERC20)">USD Coin (Ethereum - ERC20)</option>
                        <option value="USDT (ERC20)">USDT (Ethereum - ERC20)</option>
                        <option value="Solana (SOL)">Solana (SOL)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-medium uppercase tracking-wider text-neutral-400 mb-2">Recipient Terminal Address / Profile ID</label>
                    <input type="text" id="recipientAddress" required placeholder="Paste wallet address or user ID" 
                        class="w-full bg-[#1c1c1c] border border-[#333] rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#E82127] text-sm font-mono">
                </div>

                <div>
                    <label class="block text-xs font-medium uppercase tracking-wider text-neutral-400 mb-2">Transfer Amount (USD)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-3 text-neutral-500 font-medium text-sm">$</span>
                        <input type="number" id="sendAmount" required min="5" placeholder="0.00" 
                            class="w-full bg-[#1c1c1c] border border-[#333] rounded-xl pl-8 pr-4 py-3 text-white focus:outline-none focus:border-[#E82127] text-sm font-semibold">
                    </div>
                </div>

                <button type="submit" id="submitBtn" 
                    class="w-full bg-[#E82127] hover:bg-[#c61a1f] active:scale-[0.98] text-white font-medium py-3.5 rounded-xl transition-all text-sm shadow-lg shadow-red-900/20 mt-4">
                    Authorize Outbound Dispatch
                </button>
            </form>
        </div>

        <!-- Success Screen -->
        <div id="successCard" class="hidden bg-[#141414] border border-[#222] rounded-2xl p-6 shadow-2xl text-center space-y-6">
            <div id="successIcon" class="w-20 h-20 bg-emerald-500/10 border-2 border-emerald-500 rounded-2xl flex items-center justify-center mx-auto text-5xl text-emerald-400 success-check">
                ✓
            </div>
            <div>
                <h2 class="text-2xl font-bold text-emerald-400">Transaction Submitted</h2>
                <p class="text-neutral-400 mt-2">Your transfer has been successfully queued and recorded.</p>
            </div>

            <div class="bg-[#1c1c1c] border border-[#282828] rounded-xl p-5 text-left text-sm space-y-3">
                <div class="flex justify-between"><span class="text-neutral-500">Asset:</span> <span id="summaryAsset" class="font-medium"></span></div>
                <div class="flex justify-between"><span class="text-neutral-500">Amount:</span> <span id="summaryAmount" class="font-medium text-emerald-400"></span></div>
                <div class="flex justify-between"><span class="text-neutral-500">To:</span> <span id="summaryAddress" class="font-mono text-xs break-all"></span></div>
            </div>

            <a href="dashboard.html" 
               class="w-full bg-neutral-900 hover:bg-neutral-800 border border-neutral-700 text-white font-medium py-4 rounded-2xl block transition-all">
                Return to Dashboard
            </a>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx7Gg2ClxC7VdaDReZzI4jV_q8RKBDYPteFN526vQjmsxWSmGDQyy-NLkDXhivOHSh0Yw/exec";
        const userId = localStorage.getItem("userId");

        if (!userId) {
            window.location.href = "index.html";
        }

        document.getElementById('sendForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById('submitBtn');
            const statusBox = document.getElementById('statusBox');
            const formCard = document.getElementById('formCard');
            const successCard = document.getElementById('successCard');

            // Show processing state
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <span class="inline-block animate-spin mr-2">⟳</span>
                Processing Transaction...
            `;

            statusBox.classList.add('hidden');

            const amount = parseFloat(document.getElementById('sendAmount').value);
            const asset = document.getElementById('assetSelect').value;
            const recipient = document.getElementById('recipientAddress').value;

            const payload = {
                action: "submitTransfer",
                userId: userId,
                amount: amount,
                asset: asset,
                recipient: recipient,
                timestamp: new Date().toISOString()
            };

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    mode: "cors",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.status === "success") {
                    // Fill success screen
                    document.getElementById('summaryAsset').innerText = asset;
                    document.getElementById('summaryAmount').innerText = `$${amount.toFixed(2)}`;
                    document.getElementById('summaryAddress').innerText = recipient;

                    // Switch screens
                    formCard.classList.add('hidden');
                    successCard.classList.remove('hidden');
                } else {
                    throw new Error(result.message || "Transaction failed to process.");
                }
            } catch (err) {
                statusBox.className = "mb-4 p-4 text-sm rounded-xl border bg-red-950/30 border-red-900 text-red-400";
                statusBox.innerHTML = `⚠️ ${err.message || "Network error. Please try again."}`;
                statusBox.classList.remove('hidden');

                submitBtn.disabled = false;
                submitBtn.innerText = "Authorize Outbound Dispatch";
            }
        });
    </script>
</body>
</html>
