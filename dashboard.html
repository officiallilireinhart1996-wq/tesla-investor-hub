<script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxMvLEjQRlW8Gveer2mNJf-bnoFsXLVb0wjNdcGkujWwnLVzTf2iDCQI19yVUTi0rtG5w/exec";
        const userId = localStorage.getItem("userId");
        const fullName = localStorage.getItem("fullName");

        // --- NEW: FETCH REAL-TIME BALANCE & PROFIT FROM GOOGLE SHEETS ---
        async function fetchDashboardData() {
            if (!API_URL) return;
            
            try {
                // Constructing the URL with userId if your Google Apps Script requires it
                const url = userId ? `${API_URL}?userId=${encodeURIComponent(userId)}` : API_URL;
                
                const response = await fetch(url);
                if (!response.ok) throw new Error("Network response was not ok");
                
                const data = await response.json();
                
                // Expecting your Google Sheet JSON response to have 'balance' and 'profit' properties
                if (data.balance !== undefined) {
                    // Formats number to currency style: $145,280.00
                    document.getElementById("totalBalance").innerText = Number(data.balance).toLocaleString('en-US', { style: 'currency', currency: 'USD' });
                }
                if (data.profit !== undefined) {
                    document.getElementById("totalProfit").innerText = "+" + Number(data.profit).toLocaleString('en-US', { style: 'currency', currency: 'USD' });
                }
            } catch (error) {
                console.error("Error syncing with Google Sheets Terminal:", error);
                // Fallback indicators if the sheet is completely unreachable
                document.getElementById("totalBalance").innerText = "$0.00";
                document.getElementById("totalProfit").innerText = "+$0.00";
            }
        }

        // Active Inline Logout Controller Engine
        document.getElementById("logoutBtn").addEventListener("click", (e) => {
            e.preventDefault();
            localStorage.removeItem("userId");
            localStorage.removeItem("fullName");
            localStorage.removeItem("userAvatarImage");
            window.location.href = "index.html";
        });

        // Searchable Database Content Framework
        const searchDatabase = [
            { name: "Tesla Stock Shares (TSLA)", url: "buyshare.html", category: "Assets" },
            { name: "Invest Capital Assets", url: "invest.html", category: "Operations" },
            { name: "Withdrawal System Portal", url: "withdraw.html", category: "Operations" },
            { name: "Send Cryptographic Assets", url: "send.html", category: "Operations" },
            { name: "Receive Assets Network", url: "receive.html", category: "Operations" },
            { name: "Bills & Institutional Invoices", url: "bills.html", category: "Operations" },
            { name: "Account Profile & Bio Settings", url: "profile.html", category: "System" },
            { name: "System Interface Adjustments", url: "settings.html", category: "System" },
            { name: "Secure Message Terminal", url: "messages.html", category: "Communication" }
        ];

        // UI Target Hooks
        const openSearchBtn = document.getElementById("openSearchBtn");
        const closeSearchBtn = document.getElementById("closeSearchBtn");
        const searchModal = document.getElementById("searchModal");
        const searchInput = document.getElementById("searchInput");
        const searchResults = document.getElementById("searchResults");

        // Open Modal Controller
        openSearchBtn.addEventListener("click", () => {
            searchModal.classList.remove("hidden");
            setTimeout(() => {
                searchModal.classList.remove("opacity-0");
                searchModal.classList.add("opacity-100");
                searchInput.focus();
            }, 50);
            renderSearchResults(""); 
        });

        // Close Modal Controller
        function closeSearchModal() {
            searchModal.classList.remove("opacity-100");
            searchModal.classList.add("opacity-0");
            setTimeout(() => {
                searchModal.classList.add("hidden");
                searchInput.value = "";
            }, 200);
        }
        closeSearchBtn.addEventListener("click", closeSearchModal);

        // Input Filtering Mechanism
        searchInput.addEventListener("input", (e) => {
            renderSearchResults(e.target.value);
        });

        function renderSearchResults(query) {
            const cleanQuery = query.toLowerCase().trim();
            const filtered = searchDatabase.filter(item => item.name.toLowerCase().includes(cleanQuery));

            if (filtered.length === 0) {
                searchResults.innerHTML = `<div class="p-4 text-center text-xs text-neutral-500 font-mono">No matching network records found.</div>`;
            } else {
                searchResults.innerHTML = filtered.map(item => `
                    <a href="${item.url}" class="flex items-center justify-between p-3.5 hover:bg-neutral-900/60 transition-colors group">
                        <span class="text-xs text-neutral-200 font-medium group-hover:text-white">${item.name}</span>
                        <span class="text-[9px] bg-neutral-900 border border-neutral-800 text-neutral-500 font-mono tracking-wider px-2 py-0.5 rounded-md uppercase">${item.category}</span>
                    </a>
                `).join('');
            }
            searchResults.classList.remove("hidden");
        }

        // Live Declining Private Shares Counter Simulation
        function initializePrivatePoolCounter() {
            let runningShares = 1240;
            const totalShares = 10000;
            const textEl = document.getElementById('sharesRemainingText');
            const percentEl = document.getElementById('sharesPercentageText');
            const barEl = document.getElementById('sharesProgressBar');

            function updatePoolUI() {
                textEl.innerText = runningShares.toLocaleString();
                const precisionFilledPercent = (((totalShares - runningShares) / totalShares) * 100).toFixed(1);
                percentEl.innerText = `${precisionFilledPercent}%`;
                barEl.style.width = `${precisionFilledPercent}%`;
            }

            function subtractRandomShares() {
                const customDelay = Math.floor(Math.random() * (15000 - 8000 + 1)) + 8000;
                setTimeout(() => {
                    if (runningShares > 184) {
                        const chunksToSubtract = Math.floor(Math.random() * 8) + 2;
                        runningShares -= chunksToSubtract;
                        updatePoolUI();
                    }
                    subtractRandomShares();
                }, customDelay);
            }

            updatePoolUI();
            subtractRandomShares();
        }

        // Web Audio API Audio Engine Context for Chime feedback
        let audioCtx;
        function playPremiumChime(isClearAction) {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = 'sine';
                if(isClearAction) {
                    osc.frequency.setValueAtTime(520, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(220, audioCtx.currentTime + 0.25);
                } else {
                    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                }
                
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.25);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.25);
            } catch(e){}
        }

        // Dropdown Menu Toggler Execution
        const notiBellBtn = document.getElementById("notiBellBtn");
        const notiMenu = document.getElementById("notiMenu");

        notiBellBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            if(notiMenu.classList.contains("hidden")) {
                playPremiumChime(false);
                notiMenu.classList.remove("hidden");
                setTimeout(() => {
                    notiMenu.classList.remove("scale-95", "opacity-0");
                    notiMenu.classList.add("scale-100", "opacity-100");
                }, 10);
            } else {
                closeNotiMenu();
            }
        });

        function closeNotiMenu() {
            if(!notiMenu.classList.contains("hidden")) {
                notiMenu.classList.remove("scale-100", "opacity-100");
                notiMenu.classList.add("scale-95", "opacity-0");
                setTimeout(() => notiMenu.classList.add("hidden"), 150);
            }
        }

        document.addEventListener("click", (e) => {
            if(!notiMenu.contains(e.target) && e.target !== notiBellBtn) {
                closeNotiMenu();
            }
        });

        function clearSystemNotifications() {
            playPremiumChime(true);
            document.getElementById("notiListContainer").innerHTML = `
                <div class="p-6 text-center text-neutral-600 text-xs font-mono">
                    Operation logs cleared.
                </div>
            `;
            document.getElementById("notiBadge").classList.add("opacity-0", "scale-50");
        }

        // LEDGER INJECTOR FEED CONTROLLER
        function initPremiumLedgerFeed() {
            const container = document.getElementById("ledgerScrollContainer");
            if (!container) return;
            
            const mockEvents = [
                { id: "482", type: "acquisition", details: "Purchased 45 Tesla Shares ($2,500)", time: "2 mins ago" },
                { id: "911", type: "extraction", details: "Withdrew $1,400 to Bank Account", time: "12 mins ago" },
                { id: "229", type: "acquisition", details: "Purchased 18 Tesla Shares ($1,050)", time: "19 mins ago" },
                { id: "704", type: "extraction", details: "Withdrew $3,100 to Institutional Bank", time: "28 mins ago" },
                { id: "115", type: "acquisition", details: "Purchased 90 Tesla Shares ($5,300)", time: "35 mins ago" },
                { id: "883", type: "extraction", details: "Withdrew $950 to Bank Account", time: "51 mins ago" }
            ];

            function createLedgerNode(item) {
                const div = document.createElement("div");
                div.className = "bg-[#1c1c1c]/40 border border-neutral-900/60 rounded-xl p-3 flex items-center justify-between shadow-sm backdrop-blur-sm";
                
                const isAcquisition = item.type === "acquisition";
                const badgeColor = isAcquisition ? "bg-emerald-950/40 text-emerald-400 border-emerald-900/30" : "bg-red-950/40 text-red-400 border-red-900/30";
                const badgeText = isAcquisition ? "BUY" : "WIRE";

                div.innerHTML = `
                    <div class="flex items-center space-x-3">
                        <span class="text-[8px] font-black border ${badgeColor} px-1.5 py-0.5 rounded tracking-widest font-mono shrink-0">${badgeText}</span>
                        <div class="space-y-0.5">
                            <p class="text-xs text-neutral-200 font-medium">Investor ID <span class="font-mono text-neutral-400">***${item.id}</span></p>
                            <p class="text-[11px] text-neutral-400 font-normal tracking-wide">${item.details}</p>
                        </div>
                    </div>
                    <span class="text-[9px] text-neutral-600 font-medium tracking-tight shrink-0 font-mono">${item.time}</span>
                `;
                return div;
            }

            mockEvents.forEach(item => container.appendChild(createLedgerNode(item)));

            setInterval(() => {
                const firstChild = container.firstElementChild;
                if (!firstChild) return;

                container.style.transition = "transform 600ms ease-in-out";
                container.style.transform = `translateY(-${firstChild.offsetHeight + 8}px)`;

                setTimeout(() => {
                    container.style.transition = "none";
                    container.style.transform = "translateY(0)";
                    container.appendChild(firstChild);
                }, 600);
            }, 4500);
        }

        // Dynamic Chart Initialization
        function initCharts() {
            const ctxDelivery = document.getElementById('deliveryChart').getContext('2d');
            new Chart(ctxDelivery, {
                type: 'line',
                data: {
                    labels: ['Q1', 'Q2', 'Q3', 'Q4'],
                    datasets: [{
                        label: 'Vehicles Delivered',
                        data: [422000, 466000, 435000, 484000],
                        borderColor: '#E82127',
                        backgroundColor: 'rgba(232, 33, 39, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { grid: { display: false }, ticks: { color: '#8f8f8f', font: { size: 10 } } },
                        y: { grid: { color: '#222' }, ticks: { color: '#8f8f8f', font: { size: 10 } } }
                    }
                }
            });

            const ctxPortfolio = document.getElementById('portfolioChart').getContext('2d');
            new Chart(ctxPortfolio, {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [70, 20, 10],
                        backgroundColor: ['#E82127', '#3d3d3d', '#8f8f8f'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    cutout: '75%',
                    plugins: { tooltip: { enabled: false } }
                }
            });
        }

        // Mock Transaction History Generator
        function fetchTransactionHistory() {
            const tbody = document.getElementById("historyTableBody");
            tbody.innerHTML = `
                <tr class="border-b border-[#181818]">
                    <td class="py-3 font-mono text-neutral-400">06-28 / #9240</td>
                    <td class="py-3 text-neutral-300">TSLA Share Vault</td>
                    <td class="py-3 text-right font-mono text-emerald-400">+$2,500.00</td>
                    <td class="py-3 text-right text-neutral-500 font-medium">Settled</td>
                </tr>
                <tr class="border-b border-[#181818]">
                    <td class="py-3 font-mono text-neutral-400">06-25 / #8104</td>
                    <td class="py-3 text-neutral-300">Direct Wire Stream</td>
                    <td class="py-3 text-right font-mono text-neutral-200">-$1,400.00</td>
                    <td class="py-3 text-right text-neutral-500 font-medium">Settled</td>
                </tr>
            `;
        }

        // App Initializer Setup Matrix
        window.addEventListener("DOMContentLoaded", () => {
            if (fullName) {
                document.getElementById("userName").innerText = fullName;
                const initials = fullName.split(" ").map(n => n[0]).join("").substring(0,2).toUpperCase();
                document.getElementById("avatarContainer").innerText = initials || "PL";
            }
            
            // Trigger the live sheet update immediately upon loading
            fetchDashboardData();
            
            initializePrivatePoolCounter();
            initPremiumLedgerFeed();
            initCharts();
            fetchTransactionHistory();
        });
    </script>
