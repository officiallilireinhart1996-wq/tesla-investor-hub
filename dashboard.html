<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Capital Portal - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0d0d0d; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .gradient-card { background: linear-gradient(135deg, #e82127 0%, #901115 100%); }
        /* Hide scrollbars but preserve scrolling function */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-white min-h-screen pb-32">

    <div id="searchModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-md z-50 flex flex-col pt-6 px-4 transition-all duration-200 opacity-0">
        <div class="max-w-md w-full mx-auto space-y-4">
            <div class="flex items-center space-x-3 bg-neutral-900 border border-neutral-800 rounded-xl px-3.5 py-2.5 shadow-xl">
                <svg class="w-5 h-5 text-neutral-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <input type="text" id="searchInput" placeholder="Search portal actions or assets..." class="bg-transparent w-full focus:outline-none text-sm text-neutral-200 placeholder-neutral-500">
                <button id="closeSearchBtn" class="text-xs text-neutral-500 hover:text-white uppercase font-bold tracking-tight">Close</button>
            </div>
            
            <div id="searchResults" class="bg-[#121212] border border-neutral-800/80 rounded-2xl overflow-hidden hidden max-h-80 overflow-y-auto divide-y divide-neutral-900 shadow-2xl">
            </div>
        </div>
    </div>

    <header class="flex items-center justify-between px-6 py-4 border-b border-[#1c1c1c] bg-[#0d0d0d] sticky top-0 z-50">
        <div class="flex items-center space-x-3">
            <span class="text-xl font-bold tracking-widest text-[#E82127]">TESLA</span>
        </div>
        <div class="flex items-center space-x-4">
            <button id="openSearchBtn" class="text-neutral-400 hover:text-white transition-colors active:scale-95">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </button>
            
            <div class="relative">
                <button id="notiBellBtn" class="focus:outline-none relative block text-neutral-400 hover:text-white transition-colors active:scale-95">
                    <span id="notiBadge" class="absolute -top-1 -right-1 bg-[#E82127] text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold text-white transition-all">3</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
                </button>

                <div id="notiMenu" class="hidden absolute right-0 mt-3 w-72 bg-[#121212] border border-[#262626] rounded-2xl shadow-2xl overflow-hidden z-40 transition-all transform scale-95 opacity-0 origin-top-right">
                    <div class="px-4 py-3 border-b border-[#222] flex items-center justify-between">
                        <span class="text-xs font-bold tracking-wider text-neutral-400 uppercase">Live Operations Terminal</span>
                        <button onclick="clearSystemNotifications()" class="text-[9px] font-bold text-red-400 hover:text-red-500 uppercase tracking-tight">Clear All</button>
                    </div>
                    <div id="notiListContainer" class="divide-y divide-[#1c1c1c] max-h-64 overflow-y-auto">
                        <div class="p-3.5 hover:bg-neutral-900/40 transition-colors flex items-start space-x-3">
                            <span class="w-1.5 h-1.5 rounded-full bg-[#E82127] mt-1.5 shrink-0 animate-pulse"></span>
                            <div>
                                <p class="text-xs font-medium text-neutral-200">Allocation Settlement Cleared</p>
                                <p class="text-[10px] text-neutral-500 mt-0.5 font-mono">Institutional node sync fully archived.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <a href="profile.html" class="flex items-center space-x-2 active:scale-95 transition-transform">
                <div id="avatarContainer" class="w-8 h-8 rounded-full bg-neutral-800 border border-neutral-700 flex items-center justify-center text-xs font-bold text-neutral-300 overflow-hidden">PL</div>
            </a>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4 mt-4 space-y-5">
        
        <div class="relative rounded-2xl overflow-hidden h-32 bg-neutral-900 flex items-end p-4 border border-[#222]">
            <div class="absolute inset-0 bg-cover bg-center opacity-40" style="background-image: url('https://images.unsplash.com/photo-1617788138017-80ad40651399?auto=format&fit=crop&q=80&w=600');"></div>
            <div class="absolute inset-0 bg-gradient-to-t from-black via-black/50 to-transparent"></div>
            <div class="relative z-10">
                <h2 class="text-xl font-bold tracking-tight">Welcome back, <span id="userName" class="text-neutral-100">Investor</span></h2>
                <p class="text-xs text-neutral-400 mt-0.5">Track. Invest. Grow.</p>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="gradient-card rounded-2xl p-4 relative shadow-lg">
                <p class="text-[10px] font-semibold uppercase tracking-wider text-red-200">Total Balance</p>
                <h3 id="totalBalance" class="text-xl font-bold tracking-tight mt-1 text-white">$0.00</h3>
                <p class="text-[10px] text-red-200 font-medium mt-2 flex items-center">Real-time sync active</p>
            </div>

            <div class="bg-[#141414] border border-[#222] rounded-2xl p-4 shadow-lg">
                <p class="text-[10px] font-semibold uppercase tracking-wider text-neutral-500">Total Profit</p>
                <h3 id="totalProfit" class="text-xl font-bold tracking-tight mt-1 text-white">+$0.00</h3>
                <p class="text-[10px] text-emerald-400 font-medium mt-2 flex items-center">Real-time sync active</p>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2.5">
            <a href="invest.html" class="bg-[#141414] border border-[#1f1f1f] rounded-xl py-3 flex flex-col items-center justify-center transition-all active:scale-95">
                <span class="text-neutral-400 text-sm font-medium">Invest</span>
            </a>
            <a href="withdraw.html" class="bg-[#141414] border border-[#1f1f1f] rounded-xl py-3 flex flex-col items-center justify-center transition-all active:scale-95">
                <span class="text-neutral-400 text-sm font-medium">Withdraw</span>
            </a>
            <a href="send.html" class="bg-[#141414] border border-[#1f1f1f] rounded-xl py-3 flex flex-col items-center justify-center transition-all active:scale-95">
                <span class="text-neutral-400 text-sm font-medium">Send</span>
            </a>
            <a href="buyshare.html" class="bg-[#141414] border border-[#1f1f1f] rounded-xl py-3 flex flex-col items-center justify-center transition-all active:scale-95">
                <span class="text-neutral-400 text-sm font-medium">Buy Share</span>
            </a>
            <a href="receive.html" class="bg-[#141414] border border-[#1f1f1f] rounded-xl py-3 flex flex-col items-center justify-center transition-all active:scale-95">
                <span class="text-neutral-400 text-sm font-medium">Receive</span>
            </a>
            <a href="bills.html" class="bg-[#141414] border border-[#1f1f1f] rounded-xl py-3 flex flex-col items-center justify-center transition-all active:scale-95">
                <span class="text-neutral-400 text-sm font-medium">Bills</span>
            </a>
        </div>

    </main>

    <div class="fixed bottom-4 left-4 right-4 bg-[#141414]/90 backdrop-blur-md border border-[#222] h-16 rounded-2xl shadow-2xl flex items-center justify-between px-2 z-50 max-w-md mx-auto">
        <a href="dashboard.html" class="flex flex-col items-center justify-center flex-1 py-1 text-[#E82127]">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            <span class="text-[9px] font-bold mt-1 tracking-tight">Home</span>
        </a>
        <a href="#" id="logoutBtn" class="flex flex-col items-center justify-center flex-1 py-1 text-neutral-500 hover:text-red-400 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            <span class="text-[9px] font-medium mt-1 tracking-tight">Exit</span>
        </a>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyps9NxZsUPgMOvzaoJ_nX6Ix-_u5UjAY-L-2WyJd7iGu0_ZDT-7uwF3sjO7l_mwqvx/exec";
        const userId = localStorage.getItem("userId");
        const fullName = localStorage.getItem("fullName");

        if (fullName) {
            document.getElementById("userName").innerText = fullName;
        }

        // FETCH REAL-TIME METRICS FROM GOOGLE SHEETS
        function fetchDashboardMetrics() {
            if (!userId) {
                console.log("No user signed in.");
                return;
            }

            fetch(`${API_URL}?userId=${userId}`)
                .then(response => response.json())
                .then(data => {
                    if (data.status === "success") {
                        document.getElementById("totalBalance").innerText = "$" + Number(data.balance).toLocaleString('en-US', { minimumFractionDigits: 2 });
                        document.getElementById("totalProfit").innerText = "+$" + Number(data.profit).toLocaleString('en-US', { minimumFractionDigits: 2 });
                    } else {
                        console.error("Database Error:", data.message);
                    }
                })
                .catch(error => console.error("Network Error syncing dashboard:", error));
        }

        // Run sync on tab load
        window.addEventListener('DOMContentLoaded', fetchDashboardMetrics);

        // Exit Logic
        document.getElementById("logoutBtn").addEventListener("click", (e) => {
            e.preventDefault();
            localStorage.clear();
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
