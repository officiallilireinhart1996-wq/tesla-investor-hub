<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Capital Portal - Logging Out</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0d; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full text-center space-y-6">
        <h1 class="text-2xl font-bold tracking-widest text-[#E82127]">TESLA</h1>
        
        <div class="bg-[#141414] border border-[#222] rounded-2xl p-6 shadow-xl space-y-4">
            <div class="flex justify-center">
                <div class="w-8 h-8 border-2 border-neutral-800 border-t-[#E82127] rounded-full animate-spin"></div>
            </div>
            
            <div class="space-y-1">
                <h2 class="text-sm font-semibold text-neutral-200">Terminating Portal Session</h2>
                <p class="text-xs text-neutral-500 font-mono">Clearing cryptographic handshake keys...</p>
            </div>
        </div>

        <p class="text-[10px] text-neutral-600 font-mono uppercase tracking-wider">Secure Infrastructure Terminal // Disconnected</p>
    </div>

    <script>
        // Double check session cleanup just in case they reached this page directly
        localStorage.removeItem("userId");
        localStorage.removeItem("fullName");
        localStorage.removeItem("userAvatarImage");

        // Give it a smooth 1.5-second premium transition delay before returning to login
        setTimeout(() => {
            window.location.href = "index.html";
        }, 1500);
    </script>
</body>
</html>
