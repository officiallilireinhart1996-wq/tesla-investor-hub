<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Support Replies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0d; }
        .chat-bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col">

    <header class="px-6 py-4 border-b border-[#1c1c1c] bg-[#0d0d0d] flex items-center justify-between">
        <a href="dashboard.html" class="text-neutral-400">← Back</a>
        <span class="font-bold text-[#E82127]">ADMIN SUPPORT REPLIES</span>
    </header>

    <div id="chatContainer" class="flex-1 p-4 overflow-y-auto space-y-6 bg-[#0a0a0a]">
        <!-- Messages will load here -->
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxMvLEjQRlW8Gveer2mNJf-bnoFsXLVb0wjNdcGkujWwnLVzTf2iDCQI19yVUTi0rtG5w/exec";

        async function loadMessages() {
            const container = document.getElementById('chatContainer');
            container.innerHTML = '<div class="text-center py-12 text-neutral-500">Loading conversations...</div>';

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ action: "getMessages", userId: "all" })
                });
                const result = await res.json();

                if (result.status === "success" && result.messages.length > 0) {
                    container.innerHTML = result.messages.map(msg => `
                        <div class="bg-[#1f1f1f] p-4 rounded-2xl">
                            <p class="text-xs text-neutral-500">From User: ${msg.userId}</p>
                            <p class="mt-2 text-white">${msg.message}</p>
                            <p class="text-[10px] text-neutral-500 mt-2">${msg.timestamp}</p>
                            
                            <div class="mt-4 pt-4 border-t border-neutral-700">
                                <input type="text" id="reply-input-${msg.id}" placeholder="Type your reply..." 
                                       class="w-full bg-[#0d0d0d] border border-neutral-700 rounded-xl px-4 py-3 text-sm">
                                <button onclick="sendReply('${msg.id}', '${msg.userId}')" 
                                        class="mt-3 w-full bg-[#E82127] py-3 rounded-xl font-medium">Send Reply</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div class="text-center py-16 text-neutral-500">No messages yet.</div>';
                }
            } catch (e) {
                container.innerHTML = '<div class="text-red-400 text-center py-12">Error loading messages</div>';
            }
        }

        async function sendReply(msgId, userId) {
            const input = document.getElementById(`reply-input-${msgId}`);
            const replyText = input.value.trim();
            if (!replyText) return alert("Type a reply");

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({
                        action: "replyMessage",
                        userId: userId,
                        msgId: msgId,
                        reply: replyText
                    })
                });
                const result = await res.json();

                if (result.status === "success") {
                    input.value = '';
                    alert("Reply sent successfully!");
                    loadMessages();
                } else {
                    alert("Failed to send reply");
                }
            } catch (e) {
                alert("Error sending reply");
            }
        }

        // Load messages when page opens
        window.onload = loadMessages;
    </script>
</body>
</html>
