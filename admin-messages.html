<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0d0d0d] text-white min-h-screen p-4">

    <h1 class="text-xl font-bold text-[#E82127] mb-6">ADMIN SUPPORT REPLIES</h1>

    <div id="messages" class="space-y-6">
        <!-- Messages will appear here -->
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxMvLEjQRlW8Gveer2mNJf-bnoFsXLVb0wjNdcGkujWwnLVzTf2iDCQI19yVUTi0rtG5w/exec";

        async function loadMessages() {
            const container = document.getElementById('messages');
            container.innerHTML = '<p class="text-neutral-500">Loading...</p>';

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ action: "getMessages", userId: "all" })
                });
                const data = await res.json();

                if (data.status === "success" && data.messages.length > 0) {
                    container.innerHTML = data.messages.map(m => `
                        <div class="bg-[#1c1c1c] p-4 rounded-2xl">
                            <p class="text-xs text-neutral-500">User: ${m.userId}</p>
                            <p class="my-2">${m.message}</p>
                            <input type="text" id="r${m.id}" placeholder="Reply here..." class="w-full bg-black border border-gray-700 rounded-xl px-4 py-2 mt-3">
                            <button onclick="reply('${m.id}', '${m.userId}')" class="mt-2 bg-red-600 px-6 py-2 rounded-xl text-sm">Send Reply</button>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p class="text-neutral-500 text-center py-12">No messages yet.</p>';
                }
            } catch(e) {
                container.innerHTML = '<p class="text-red-400">Error loading messages</p>';
            }
        }

        async function reply(msgId, userId) {
            const input = document.getElementById('r' + msgId);
            const text = input.value.trim();
            if (!text) return;

            try {
                await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ action: "replyMessage", userId, msgId, reply: text })
                });
                input.value = '';
                alert("Reply sent!");
                loadMessages();
            } catch(e) {
                alert("Failed to send");
            }
        }

        loadMessages();
    </script>
</body>
</html>
