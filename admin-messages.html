<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-6">

    <h1 class="text-red-500 text-2xl mb-8">ADMIN TEST PAGE</h1>

    <button onclick="loadMessages()" class="bg-red-600 px-6 py-3 rounded-xl mb-6">Load Messages</button>

    <div id="output" class="bg-zinc-900 p-4 rounded-2xl min-h-96"></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxMvLEjQRlW8Gveer2mNJf-bnoFsXLVb0wjNdcGkujWwnLVzTf2iDCQI19yVUTi0rtG5w/exec";

        async function loadMessages() {
            const output = document.getElementById('output');
            output.innerHTML = "Loading...";

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: {"Content-Type": "text/plain"},
                    body: JSON.stringify({ action: "getMessages", userId: "all" })
                });
                const data = await res.json();

                output.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch(e) {
                output.innerHTML = "Error: " + e.message;
            }
        }
    </script>
</body>
</html>
