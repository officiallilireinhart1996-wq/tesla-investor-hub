<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Capital Portal - Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0d; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-white min-h-screen pb-32">

    <header class="flex items-center justify-between px-6 py-4 border-b border-[#1c1c1c] bg-[#0d0d0d] sticky top-0 z-50">
        <div class="flex items-center space-x-3">
            <a href="dashboard.html" class="text-neutral-400 hover:text-white transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path>
                </svg>
            </a>
            <span class="text-lg font-bold tracking-tight">Account Profile</span>
        </div>
        <span class="text-[10px] bg-neutral-900 border border-neutral-800 text-neutral-400 font-mono px-2.5 py-1 rounded-md">SECURE NODE</span>
    </header>

    <main class="max-w-md mx-auto px-4 mt-8 flex flex-col items-center">
        
        <div class="relative group cursor-pointer flex flex-col items-center">
            <input type="file" id="avatarInput" accept="image/*" class="hidden">
            
            <div onclick="document.getElementById('avatarInput').click()" class="w-28 h-28 rounded-full bg-neutral-900 border-2 border-[#E82127] flex items-center justify-center overflow-hidden shadow-2xl relative transition-all active:scale-95 hover:border-red-500">
                <div id="avatarInitials" class="text-2xl font-bold text-neutral-300 tracking-wider">PL</div>
                <img id="avatarImage" class="w-full h-full object-cover hidden" alt="Profile Picture">
                
                <div class="absolute inset-0 bg-black/60 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                    <span class="text-[10px] font-bold uppercase tracking-wider text-red-400">Change</span>
                </div>
            </div>
            
            <h2 id="profileName" class="text-xl font-bold tracking-tight mt-4 text-neutral-200">Investor</h2>
            <p id="profileId" class="text-[10px] text-neutral-500 font-mono mt-1">ID: FETCHING...</p>
        </div>

        <div class="w-full mt-8 space-y-3">
            <div class="bg-[#141414] border border-[#222] rounded-xl p-4 flex items-center justify-between">
                <div>
                    <p class="text-xs font-bold text-neutral-300">Identity Status</p>
                    <p class="text-[10px] text-neutral-500">Institutional clearance tier</p>
                </div>
                <span class="text-[10px] text-emerald-400 font-bold bg-emerald-950/30 px-2.5 py-1 rounded border border-emerald-900/20">VERIFIED ARCHIVE</span>
            </div>

            <div class="bg-[#141414] border border-[#222] rounded-xl p-4 flex items-center justify-between">
                <div>
                    <p class="text-xs font-bold text-neutral-300">Biometric Bind</p>
                    <p class="text-[10px] text-neutral-500">Device signature checkpoint</p>
                </div>
                <span class="text-[10px] text-neutral-400 font-bold bg-neutral-900 px-2.5 py-1 rounded border border-neutral-800">LOCKED</span>
            </div>
        </div>

    </main>

    <div class="fixed bottom-4 left-4 right-4 bg-[#141414]/90 backdrop-blur-md border border-[#222] h-16 rounded-2xl shadow-2xl flex items-center justify-between px-2 z-50 max-w-md mx-auto">
        <a href="dashboard.html" class="flex flex-col items-center justify-center flex-1 py-1 text-neutral-400 hover:text-white transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
            </svg>
            <span class="text-[9px] font-medium mt-1 tracking-tight">Home</span>
        </a>
        <a href="settings.html" class="flex flex-col items-center justify-center flex-1 py-1 text-neutral-400 hover:text-white transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
            <span class="text-[9px] font-medium mt-1 tracking-tight">Settings</span>
        </a>
        <a href="messages.html" class="flex flex-col items-center justify-center flex-1 py-1 text-neutral-400 hover:text-white transition-colors relative">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
            </svg>
            <span class="absolute top-1 right-5 bg-[#E82127] text-white text-[8px] font-bold w-3.5 h-3.5 rounded-full flex items-center justify-center border border-[#141414]">3</span>
            <span class="text-[9px] font-medium mt-1 tracking-tight">Messages</span>
        </a>
        <a href="about.html" class="flex flex-col items-center justify-center flex-1 py-1 text-neutral-400 hover:text-white transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span class="text-[9px] font-medium mt-1 tracking-tight">About</span>
        </a>
        <a href="logout.html" class="flex flex-col items-center justify-center flex-1 py-1 text-neutral-500 hover:text-red-400 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
            </svg>
            <span class="text-[9px] font-medium mt-1 tracking-tight">Exit</span>
        </a>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const userId = localStorage.getItem("userId");
            const fullName = localStorage.getItem("fullName");

            if (!userId) {
                window.location.href = "index.html";
                return;
            }

            // Setup display name and pseudo ID
            document.getElementById('profileName').innerText = fullName || "Investor";
            document.getElementById('profileId').innerText = `ID: ${userId}`;

            // Check if user already has a saved image string
            const savedAvatar = localStorage.getItem("userAvatarImage");
            if (savedAvatar) {
                showImageAvatar(savedAvatar);
            } else if (fullName) {
                // Generates dynamic clean two-letter initials if no custom photo yet
                const initials = fullName.split(" ").map(n => n[0]).join("").toUpperCase().substring(0, 2);
                document.getElementById('avatarInitials').innerText = initials;
            }

            // Handle uploading new file
            const fileInput = document.getElementById('avatarInput');
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const base64String = event.target.result;
                        localStorage.setItem("userAvatarImage", base64String);
                        showImageAvatar(base64String);
                    };
                    reader.readAsDataURL(file);
                }
            });
        });

        function showImageAvatar(base64Data) {
            const imgEl = document.getElementById('avatarImage');
            const initialsEl = document.getElementById('avatarInitials');
            imgEl.src = base64Data;
            imgEl.classList.remove('hidden');
            initialsEl.classList.add('hidden');
        }
    </script>
</body>
</html>
