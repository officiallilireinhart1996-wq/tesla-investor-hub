<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tesla Capital Portal - Messages</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0d0d0d; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .chat-bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; }
        .reply { margin-left: 20px; border-left: 3px solid #E82127; padding-left: 10px; }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col">

    <header class="flex items-center justify-between px-6 py-4 border-b border-[#1c1c1c] bg-[#0d0d0d]">
        <a href="dashboard.html" class="text-neutral-400 hover:text-white flex items-center text-sm">
            ‹ Back to Hub
        </a>
        <span class="text-xs font-bold tracking-widest text-[#E82127] uppercase">Support Desk</span>
        <div class="w-8"></div>
    </header>

    <div id="chatContainer" class="flex-1 p-4 overflow-y-auto space-y-4 bg-[#0a0a0a]">
        <!-- Messages load here -->
    </div>

    <div class="p-4 border-t border-[#222] bg-[#0d0d0d]">
        <div class="flex gap-2">
            <input type="text" id="messageInput" 
                   placeholder="Type your message to support..." 
                   class="flex-1 bg-[#1c1c1c] border border-[#333] rounded-2xl px-5 py-3 text-white focus:outline-none focus:border-[#E82127]">
            <button onclick="sendMessage()" 
                    class="bg-[#E82127] hover:bg-red-600 px-8 rounded-2xl font-medium transition-colors">
                Send
            </button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxMvLEjQRlW8Gveer2mNJf-bnoFsXLVb0wjNdcGkujWwnLVzTf2iDCQI19yVUTi0rtG5w/exec";
        const userId = localStorage.getItem("userId");

        if (!userId) {
            window.location.href = "index.html";
        }

        async function loadMessages() {
            const container = document.getElementById('chatContainer');
            container.innerHTML = '<div class="text-center py-12 text-neutral-500">Loading conversation...</div>';

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({ action: "getMessages", userId: userId })
                });
                const result = await res.json();

                if (result.status === "success") {
                    if (result.messages.length === 0) {
                        container.innerHTML = `
                            <div class="text-center py-16 text-neutral-500">
                                <p class="text-2xl mb-2">👋</p>
                                <p>Welcome to Tesla Capital Support</p>
                                <p class="text-sm mt-2">Send your first message below</p>
                            </div>`;
                    } else {
                        let html = '';
                        const grouped = {};

                        result.messages.forEach(msg => {
                            if (!msg.replyTo) {
                                if (!grouped[msg.id]) grouped[msg.id] = [];
                                grouped[msg.id].push(msg);
                            } else {
                                if (!grouped[msg.replyTo]) grouped[msg.replyTo] = [];
                                grouped[msg.replyTo].push(msg);
                            }
                        });

                        Object.keys(grouped).forEach(key => {
                            const thread = grouped[key];
                            html += thread.map(msg => `
                                <div class="${msg.from === 'User' ? 'text-right' : 'text-left'}">
                                    <div class="chat-bubble inline-block ${msg.from === 'User' ? 'bg-[#E82127] text-white' : 'bg-[#1f1f1f]'}">
                                        <p>${msg.message}</p>
                                        <p class="text-[10px] mt-1 opacity-75">${msg.timestamp} • ${msg.from}</p>
                                    </div>
                                </div>
                            `).join('');
                        });

                        container.innerHTML = html;
                    }
                }
            } catch (e) {
                container.innerHTML = '<div class="text-red-400 text-center py-8">Could not load messages</div>';
            }
            container.scrollTop = container.scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            const btns = document.querySelectorAll('button');
            btns.forEach(b => b.disabled = true);

            try {
                await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "text/plain" },
                    body: JSON.stringify({
                        action: "submitMessage",
                        userId: userId,
                        message: text
                    })
                });
                input.value = '';
                loadMessages();
            } catch (e) {
                alert("Failed to send message");
            }

            btns.forEach(b => b.disabled = false);
        }

        // Load messages when page opens
        loadMessages();

        // Refresh every 8 seconds
        setInterval(loadMessages, 8000);
    </script>
</body>
</html>
